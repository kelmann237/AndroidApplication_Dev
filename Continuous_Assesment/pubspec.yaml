name: grade_manager
description: A Flutter app to manage and calculate student grades.
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Excel file reading
  excel: ^4.0.6

  # File picker (for picking .xlsx files)
  file_picker: ^8.1.7

  # PDF generation (export feature)
  pdf: ^3.10.8

  # Share files via native OS share sheet (export feature)
  share_plus: ^10.1.4

  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true